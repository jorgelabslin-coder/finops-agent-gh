name: FinOps Daily Intelligence

on:
  schedule:
    - cron: '30 6 * * *'
  workflow_dispatch:

concurrency:
  group: finops-daily
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  collect-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Cache data directory
        uses: actions/cache@v4
        with:
          path: ./data
          key: finops-data-${{ github.run_id }}
          restore-keys: finops-data-

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install --with-deps chromium

      - name: Inject GITHUB_TOKEN for API access
        run: python -c "import yaml,os;c=yaml.safe_load(open('config.yaml'));c.setdefault('api_keys',{})['github']=os.environ['GH_TOKEN'];yaml.dump(c,open('config.yaml','w'))"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run daily collection
        run: python -m src.main --daily

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./data/site
          keep_files: true

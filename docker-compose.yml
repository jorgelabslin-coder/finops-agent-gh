version: "3.9"

services:
  collector:
    build: .
    container_name: finops-collector
    command: ["--daily"]
    volumes:
      - ./data:/app/data
      - ./config.yaml:/app/config.yaml
    restart: "no"

  web:
    build: .
    container_name: finops-web
    command: ["--serve"]
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./config.yaml:/app/config.yaml
    restart: unless-stopped

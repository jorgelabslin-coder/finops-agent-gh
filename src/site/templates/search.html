{% extends "base.html" %}
{% block title %}Search FinOps{% endblock %}
{% block content %}
<div class="hero" style="padding:2rem 0 1.5rem;">
<h1 style="font-size:clamp(1.8rem,3vw,2.5rem)">Search</h1>
<p>Search across all collected FinOps intelligence</p>
</div>

<div class="search-box">
<input type="text" id="searchInput" placeholder="Search titles, summaries, tags..." oninput="doSearch(this.value)">
</div>
<div id="results"></div>

<script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0/dist/fuse.min.js"></script>
<script>
let fuse = null;
let allItems = [];

async function loadItems() {
try {
const resp = await fetch('{{ root_path }}day/items.json');
if (!resp.ok) throw new Error('Not found');
allItems = await resp.json();
fuse = new Fuse(allItems, { keys: ['title', 'summary', 'tags', 'source_name'], threshold: 0.4 });
} catch(e) {
document.getElementById('results').innerHTML = '<p style="text-align:center;color:#64748b;padding:2rem;">Search index not available in static mode.</p>';
}
}

function doSearch(q) {
const el = document.getElementById('results');
if (!q || !fuse) { el.innerHTML = ''; return; }
const results = fuse.search(q).slice(0, 50);
el.innerHTML = results.map(r => `
<div class="card">
<h3><a href="${r.item.url}" target="_blank" rel="noopener">${r.item.title}</a></h3>
<div class="meta">${r.item.date} · ${r.item.source_name || r.item.source_id}</div>
${r.item.summary ? `<div class="summary">${r.item.summary.slice(0,300)}</div>` : ''}
</div>
`).join('');
}

loadItems();
</script>
{% endblock %}
